<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatServe 聊天室</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="app">
    <!-- ========== 登录界面 ========== -->
    <div id="login">
        <h2>ChatServe</h2>
        <div class="login-box">
            <p>加入聊天室</p>
            <input id="room-input" type="text" placeholder="请输入房间号">
            <input id="nick-input" type="text" placeholder="昵称（默认随机）">
            <button id="join-btn">加入</button>
        </div>
    </div>

    <!-- ========== 聊天界面 ========== -->
    <div id="chat" style="display:none">
        <div id="chat-header">
            <div id="header-left">
                <span id="conn-status" class="status-connected">● 已连接</span>
                <span id="room-name"></span>
            </div>
            <div id="header-right">
                <span id="member-count">在线: 0 人</span>
                <button id="leave-btn">退出房间</button>
            </div>
        </div>
        <div id="chat-body">
            <div id="messages"></div>
            <div id="member-list">
                <div id="member-title">房间成员</div>
                <div id="members"></div>
            </div>
        </div>
        <!-- ========== 文件预览区（选择文件后显示） ========== -->
        <div id="file-preview" style="display:none">
            <div class="file-preview-info">
                <span class="file-icon">📎</span>
                <span id="file-preview-name"></span>
                <span id="file-preview-size"></span>
            </div>
            <div class="file-preview-actions">
                <button id="file-cancel-btn">取消</button>
                <button id="file-send-btn">发送文件</button>
            </div>
            <div id="upload-progress-wrap" style="display:none">
                <div id="upload-progress-bar"><div id="upload-progress-fill"></div></div>
                <span id="upload-progress-text">0%</span>
            </div>
        </div>
        <!-- ========== 输入区 ========== -->
        <div id="input-area">
            <label id="file-btn" title="发送文件">
                <svg viewBox="0 0 24 24" width="22" height="22">
                    <path fill="currentColor" d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
                </svg>
                <input type="file" id="file-input" hidden>
            </label>
            <input id="msg-input" type="text" placeholder="输入消息..." autofocus>
            <button id="send-btn">发送</button>
        </div>
    </div>
</div>

<script src="/app.js"></script>
</body>
</html>
